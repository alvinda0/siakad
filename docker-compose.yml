services:

  # ─── PHP-FPM Application ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siakad_app
    restart: unless-stopped
    environment:
      APP_NAME: Siakad
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: http://localhost

      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-siakad}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}

      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database

      LOG_CHANNEL: stderr
      LOG_LEVEL: error
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
      # Share public folder dengan nginx
      - public_data:/var/www/html/public
    expose:
      - "9000"

  # ─── Nginx Web Server ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: siakad_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Nginx butuh akses ke public folder (untuk static assets)
      - public_data:/var/www/html/public:ro
    depends_on:
      - app

  # ─── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: siakad_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-siakad}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-siakad}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  app_storage:
  app_logs:
  public_data:
